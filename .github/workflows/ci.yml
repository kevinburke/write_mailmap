name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.5.0
        with:
          go-version: stable

      - run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - run: make test
